# Rapier core-0.34 spike — controlled stable-vs-candidate experiment.
#
# workflow_dispatch ONLY: never a required check, never on push/PR. It builds the
# candidate Rapier (upstream monorepo core 0.34) FROM SOURCE, then runs the rerun
# matrix on a controlled same-commit pair {stable npm 0.19.3, candidate tarballs}
# so the docs/rapier-034-spike-2026-07.md figures become re-dispatchable and
# artifact-audited. Outcome B is already established locally; this is the
# committed instrument for the auditability / controlled-pair / skipped-matrix
# review blockers — they CLOSE when the first heavy=true dispatch succeeds and
# its comparison is folded into the decision record (C5), not at commit time.
#
# The candidate build is the heaviest step and the wasm bytes are NOT
# byte-reproducible across environments — the verdict reproduces at
# CLASSIFICATION level (catastrophic vs quiescent, prevalence counts), which is
# what compare-spike-runs.js adjudicates. If a from-source step proves
# intractable in CI, the honest fallback is to keep the local build as
# provenance and downgrade candidate figures to local-only (see the decision
# record §2 risk note).

name: rapier-034-spike-experiment

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream dimforge/rapier commit/ref to build the candidate from
        default: c13133ad293ee70c7f9cec9e498eac016c362169
        type: string
      heavy:
        description: >-
          Full evidence (all-witness matrix + complete 60-member prevalence).
          true is REQUIRED for a citable run; false is a debug-only quick mode
          that MUST NOT feed the committed decision record.
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  # Resolve the BoxCar3D commit ONCE to an immutable 40-char SHA; every
  # downstream job checks out that exact SHA (never a moving branch ref), and it
  # is written into every arm's manifest so each run attests its own runtime SHA.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - id: sha
        run: |
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "Resolved BoxCar3D experiment SHA: ${{ github.sha }}"

  # Build both 3D compat flavors from source with upstream's packaging scripts
  # UNMODIFIED (all six flavors, no gen_src/rollup trim), in the required order
  # (deterministic-3D first), with an asserted system wasm-pack (NOT the upstream
  # typescript/package.json 0.12.1 devDep — build-rust.sh is invoked directly, so
  # node_modules/.bin never PATH-shadows the intended toolchain).
  build-candidate:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream Rapier
        uses: actions/checkout@v4
        with:
          repository: dimforge/rapier
          ref: ${{ inputs.upstream_ref }}
          path: rapier-upstream
      - name: Resolve the upstream ref to an immutable SHA
        run: |
          set -euo pipefail
          # The input accepts a commit OR a tag/branch; a moving ref could build
          # different commits across two runs with the same recorded upstreamRef.
          # Pin the ACTUAL checked-out commit and drive the identity suffix +
          # provenance from it (the default input is already an immutable SHA,
          # for which this is a no-op).
          RESOLVED="$(git -C rapier-upstream rev-parse HEAD)"
          echo "UPSTREAM_SHA=${RESOLVED}" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHORT=$(echo "${RESOLVED}" | cut -c1-8)" >> "$GITHUB_ENV"
          echo "Requested ref '${{ inputs.upstream_ref }}' -> resolved ${RESOLVED}"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust 1.90.0 + wasm32 target
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: wasm32-unknown-unknown
      - name: Install + ASSERT wasm-pack 0.13.1 (system, not the upstream devDep)
        run: |
          set -euo pipefail
          cargo install wasm-pack --version 0.13.1 --locked
          WP="$(command -v wasm-pack)"
          echo "wasm-pack path: $WP"
          wasm-pack --version
          case "$WP" in
            *node_modules*) echo "REFUSING: wasm-pack resolves inside node_modules (the 0.12.1 shadow)"; exit 1 ;;
          esac
          wasm-pack --version | grep -q '0.13.1' || { echo "wasm-pack is not 0.13.1"; exit 1; }
      - name: Identity patch (crate version) — the ONLY engine/source edit
        working-directory: rapier-upstream/typescript
        run: |
          set -euo pipefail
          # Suffix from the RESOLVED commit short SHA, never the (possibly
          # moving) input ref.
          sed -i "s/^version = \"0.19.3\"$/version = \"0.19.3-${UPSTREAM_SHORT}.0\"/" \
            builds/prepare_builds/templates/Cargo.toml.tera
          grep '^version' builds/prepare_builds/templates/Cargo.toml.tera
      - name: Prepare flavor crates + compat tools
        working-directory: rapier-upstream/typescript
        run: |
          set -euo pipefail
          npm ci
          ./builds/prepare_builds/prepare_all_projects.sh
          cd rapier-compat && npm ci
      - name: Build all six wasm flavors (deterministic-3D FIRST), unmodified scripts
        working-directory: rapier-upstream/typescript/rapier-compat
        run: |
          set -euo pipefail
          bash ./build-rust.sh -f deterministic -d 3        # owns the determinism contract → first
          bash ./build-rust.sh -f non-deterministic -d 3
          bash ./build-rust.sh -f non-deterministic -d 2
          bash ./build-rust.sh -f deterministic -d 2
          bash ./build-rust.sh -f simd -d 2
          bash ./build-rust.sh -f simd -d 3
      - name: Package (gen_src + rollup + fix_raw_file, all unmodified)
        working-directory: rapier-upstream/typescript/rapier-compat
        run: |
          set -euo pipefail
          sh ./gen_src.sh
          npx rollup --config rollup.config.js --bundleConfigAsCjs
          sh ./fix_raw_file.sh
      - name: npm pack the two 3D compat packages + hash + provenance
        working-directory: rapier-upstream/typescript/rapier-compat
        env:
          SHA: ${{ needs.resolve.outputs.sha }}
          UPSTREAM_REF: ${{ inputs.upstream_ref }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/tarballs"
          # The built compat package manifests. Build logs confirm the two flavor
          # dirs are builds/3d and builds/3d-deterministic (wasm pkg at
          # builds/<flavor>/wasm-build; the compat package assembled under
          # builds/<flavor>). The string "rapier3d-compat" lives in the package
          # NAME, not the filesystem PATH, so a `-path '*rapier3d*compat*'` glob
          # matches nothing — discover by scanning those two confirmed dirs and
          # filter by the exact `.name` below.
          mapfile -t PKGS < <(find builds/3d builds/3d-deterministic -name package.json -not -path '*/node_modules/*' | sort -u)
          echo "Found candidate package.json under builds/3d[-deterministic]:"; printf '  %s\n' "${PKGS[@]}"
          for pj in "${PKGS[@]}"; do
            dir="$(dirname "$pj")"
            name="$(node -p "require('./$pj').name")"
            case "$name" in
              @dimforge/rapier3d-compat|@dimforge/rapier3d-deterministic-compat)
                ( cd "$dir" && npm pack --pack-destination "$GITHUB_WORKSPACE/tarballs" ) ;;
              *) echo "skip $name (not a 3D compat package)" ;;
            esac
          done
          cd "$GITHUB_WORKSPACE"
          ls -l tarballs
          ( cd tarballs && sha256sum ./*.tgz > sha256.txt && cat sha256.txt )
          # Export the discovered paths as env vars the node block reads directly
          # (these are SHELL vars — never reference them via ${{ env.* }}).
          # Explicit flavor dirs: the ordinary build's feature postfix is EMPTY
          # upstream, so its wasm lands at builds/3d/wasm-build — a
          # '*non-deterministic*' path glob matches NOTHING (and a bare
          # '*deterministic*' would match the ordinary dir's sibling only by
          # luck). Build logs confirm both paths.
          COMPAT="rapier-upstream/typescript/rapier-compat"
          export ORD_WASM="$COMPAT/builds/3d/wasm-build/rapier_wasm3d_bg.wasm"
          export DET_WASM="$COMPAT/builds/3d-deterministic/wasm-build/rapier_wasm3d_bg.wasm"
          for w in "$ORD_WASM" "$DET_WASM"; do
            [ -f "$w" ] || { echo "MISSING expected wasm: $w"; find rapier-upstream -name 'rapier_wasm3d_bg.wasm' | head; exit 1; }
          done
          export ORD_TGZ="$(ls tarballs/dimforge-rapier3d-compat-*.tgz 2>/dev/null | head -n1 || true)"
          export DET_TGZ="$(ls tarballs/dimforge-rapier3d-deterministic-compat-*.tgz 2>/dev/null | head -n1 || true)"
          # Assemble the FULL provenance bundle in ONE flat dir (a single upload
          # path, so download-artifact yields artifacts/provenance/<file> with no
          # extra nesting — a multi-path upload preserves directory prefixes and
          # would bury the record under provenance/provenance/). Contents: the
          # ACTUAL upstream patch (not just --stat), the generated package
          # manifests extracted from the tarballs themselves, the tarball
          # hashes, and the JSON record.
          mkdir -p provenance
          git -C rapier-upstream diff > provenance/upstream.patch
          cp tarballs/sha256.txt provenance/
          if [ -n "$ORD_TGZ" ]; then tar -xzOf "$ORD_TGZ" package/package.json > provenance/manifest-ordinary.json; fi
          if [ -n "$DET_TGZ" ]; then tar -xzOf "$DET_TGZ" package/package.json > provenance/manifest-deterministic.json; fi
          node -e '
            const { execSync } = require("node:child_process");
            const fs = require("node:fs");
            const sha = (f) => (f && fs.existsSync(f)) ? execSync(`sha256sum "${f}"`).toString().split(" ")[0] : null;
            const prov = {
              schema: "boxcar3d.candidate-provenance/2",
              resolvedSha: process.env.SHA,
              requestedUpstreamRef: process.env.UPSTREAM_REF,
              resolvedUpstreamSha: process.env.UPSTREAM_SHA,
              identitySuffix: `0.19.3-${process.env.UPSTREAM_SHORT}.0`,
              wasmPack: execSync("wasm-pack --version").toString().trim(),
              rustc: execSync("rustc --version").toString().trim(),
              node: process.version,
              tarballs: { ordinary: sha(process.env.ORD_TGZ), deterministic: sha(process.env.DET_TGZ) },
              wasm: { ordinary: sha(process.env.ORD_WASM), deterministic: sha(process.env.DET_WASM) },
              upstreamPatchSha256: sha("provenance/upstream.patch"),
              gitDiffStat: execSync("git -C rapier-upstream diff --stat").toString(),
            };
            fs.writeFileSync("provenance/candidate-provenance.json", JSON.stringify(prov, null, 2));
            console.log(prov);
          '
          ls -l provenance
      - name: Upload candidate tarballs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-tarballs
          path: tarballs/*.tgz
          if-no-files-found: warn
      - name: Upload provenance bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: provenance
          if-no-files-found: warn

  # The rerun matrix: {stable, candidate} on the SAME resolved SHA. Every command
  # runs, its exit code + JSON captured, and NOTHING fails the run step — the
  # adjudicate step enforces the pass/fail policy so `if: always()` uploads
  # complete evidence even when a command fails.
  matrix:
    needs: [resolve, build-candidate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arm: [stable, candidate]
    env:
      ARM: ${{ matrix.arm }}
      HEAVY: ${{ inputs.heavy }}
    steps:
      - name: Checkout the resolved BoxCar3D SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Record stable pre-rewrite lock hash
        run: sha256sum package-lock.json | tee stable-lock.sha256
      - run: npm ci
      - name: Download candidate tarballs (candidate arm only)
        if: matrix.arm == 'candidate'
        uses: actions/download-artifact@v4
        with:
          name: candidate-tarballs
          path: dl
      - name: Install candidate + archive
        if: matrix.arm == 'candidate'
        run: |
          set -euo pipefail
          npm install ./dl/dimforge-rapier3d-compat-*.tgz ./dl/dimforge-rapier3d-deterministic-compat-*.tgz
          echo "Installed candidate tarballs:"; ls -l dl
          # Archive the candidate-INSTALL state (amendment 8): the rewritten
          # package.json + package-lock.json ride the results-candidate artifact
          # so the exact dependency rewrite is auditable alongside the results.
          mkdir -p "results-${ARM}"
          cp package.json "results-${ARM}/candidate-package.json"
          cp package-lock.json "results-${ARM}/candidate-package-lock.json"
      - name: Playwright Chromium (cached, version-keyed)
        id: pw
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - run: npx playwright install --with-deps chromium
      - name: Run the rerun matrix (capture-only; never fails here)
        run: |
          # GitHub's default shell is `bash -e`; DISABLE errexit here. This
          # step MUST capture non-zero exits (the candidate's `npm test` exits
          # 1 by design — 11 expected reds — a failing app-scene gate, a
          # `timeout` 124) without aborting — the Adjudicate step is the sole
          # pass/fail authority. (The earlier `set -uo pipefail` alone left
          # -e on, so the first non-hanging failure killed the whole step.)
          set +e -u -o pipefail
          RES="results-${ARM}"
          mkdir -p "$RES"
          # A failing command never aborts the capture loop (errexit off).
          # Capture with a FILE REDIRECT, never `| tee`: a command's
          # orphaned grandchild (e.g. a `vite preview` that outlives the
          # app-scene node process) inherits the stdout fd — with a pipe to tee
          # that holds the pipeline open FOREVER (the observed 50-min hang),
          # but a file fd never blocks the shell, so `$?` returns the moment the
          # FOREGROUND command exits. `timeout` is the hard backstop for any
          # genuinely hanging command (SIGTERM, then SIGKILL 30s later);
          # RUN_TIMEOUT is generous (heavy probes are long) but finite.
          run() {
            name="$1"; shift
            echo "::group::${name}"
            timeout --kill-after=30 "${RUN_TIMEOUT:-3000}" "$@" > "${RES}/${name}.log" 2>&1
            code=$?
            cat "${RES}/${name}.log" || true
            echo "$code" > "${RES}/exit-${name}.txt"
            echo "::endgroup::"
            echo "${name} exit ${code}"
          }
          run package-smoke npm run probe:package-smoke
          run lint npm run lint
          run build npm run build
          run app-scene node scripts/probe-app-scene-smoke.js
          run timing npm run probe:timing
          # npm test subsumes test:determinism (the four determinism files run
          # inside it), so npm-test.json carries the Node determinism digests —
          # no separate test:determinism run needed.
          run npmtest npx vitest run --reporter=default --reporter=json --outputFile="${RES}/npm-test.json"
          run browser npx vitest run --config vitest.browser.config.js --reporter=default --reporter=json --outputFile="${RES}/browser.json"
          run reproducer npm run probe:physics-explosion -- --pass reproducer --json "${RES}/reproducer.json"
          run freshseed npm run probe:physics-explosion -- --pass prevalence --prevalence-seeds 20260730 --json "${RES}/freshseed.json"
          if [ "${HEAVY}" = "true" ]; then
            run witnesses npm run probe:physics-explosion -- --witness all --pass all --json "${RES}/witnesses.json"
            run prevalence npm run probe:physics-explosion -- --pass prevalence --json "${RES}/prevalence.json"
          fi
      - name: Write arm manifest
        run: |
          set -euo pipefail
          RES="results-${ARM}"
          node -e '
            const fs = require("node:fs");
            const res = process.env.RES;
            const readExit = (n) => { try { return Number(fs.readFileSync(`${res}/exit-${n}.txt`,"utf8").trim()); } catch { return null; } };
            const names = ["package-smoke","lint","build","app-scene","timing","npmtest","browser","reproducer","freshseed","witnesses","prevalence"];
            const exits = Object.fromEntries(names.map(n => [n, readExit(n)]));
            const stableLock = fs.readFileSync("stable-lock.sha256","utf8").trim().split(" ")[0];
            const manifest = {
              schema: "boxcar3d.arm-manifest/1",
              arm: process.env.ARM,
              resolvedSha: process.env.SHA,
              heavy: process.env.HEAVY === "true",
              stablePreRewriteLockSha256: stableLock,
              exits,
            };
            fs.writeFileSync(`${res}/arm-manifest.json`, JSON.stringify(manifest, null, 2));
            console.log(manifest);
          '
        env:
          RES: results-${{ matrix.arm }}
          SHA: ${{ needs.resolve.outputs.sha }}
      - name: Adjudicate (machine-enforced classification)
        run: |
          set -uo pipefail
          RES="results-${ARM}"
          fail=0
          gate() {
            code=$(cat "${RES}/exit-$1.txt" 2>/dev/null || echo missing)
            if [ "$code" != "0" ]; then echo "GATE FAIL: $1 exit ${code}"; fail=1; else echo "gate ok: $1"; fi
          }
          # GATE on BOTH arms (structural / engine-independent / consumability):
          for g in package-smoke lint build app-scene reproducer freshseed; do gate "$g"; done
          if [ "${HEAVY}" = "true" ]; then
            # prevalence GATEs on BOTH arms (both complete + exit 0). The full
            # witness forensic matrix (--witness all --pass all) GATEs on STABLE
            # only; on the CANDIDATE it is OBSERVE. Core 0.34 crashes that matrix
            # UNRECOVERABLY: a wasm-bindgen borrow-guard panic at world.free()
            # and, once that is caught, RuntimeError: unreachable at world.step()
            # (an unrecoverable wasm trap). Stable completes the IDENTICAL matrix
            # cleanly, so the crash is Outcome-B evidence, not a defect to gate
            # on. Citability rests on reproducer (catastrophic-on-both) +
            # prevalence, both green on the candidate; the crash exit + signature
            # are recorded (arm-manifest.exits.witnesses + the compare borrow/
            # panic scan of witnesses.log).
            gate prevalence
            if [ "${ARM}" = "stable" ]; then
              gate witnesses
              # Stable must PROVABLY free every world cleanly. FAIL-CLOSED:
              # exit-0-alone does NOT prove the matrix completed — a --json
              # regression or a truncated write would exit 0 with no valid
              # witnesses.json. Require the artifact to be present, parse, carry
              # a freeErrors ARRAY, and have that array EMPTY. Missing / malformed
              # / non-array / non-empty all fail the arm (never a silent pass).
              node -e 'const p=process.argv[1];let r;try{r=JSON.parse(require("fs").readFileSync(p,"utf8"))}catch(e){console.error("STABLE witnesses.json MISSING or MALFORMED ("+e.message+") — a stable heavy run MUST produce a valid witnesses.json (fail-closed)");process.exit(1)}if(!Array.isArray(r.freeErrors)){console.error("STABLE witnesses.json has no freeErrors ARRAY (schema-invalid)");process.exit(1)}if(r.freeErrors.length){console.error("STABLE world.free() freeErrors NOT empty ("+r.freeErrors.length+"): "+r.freeErrors.join(" | "));process.exit(1)}console.log("stable witnesses valid + freeErrors empty: ok")' "${RES}/witnesses.json" || fail=1
            else
              # Candidate forensic matrix is OBSERVE, not gated — but classify the
              # exit HONESTLY: ONLY a recognized ownership/unreachable signature
              # in witnesses.log is Outcome-B crash evidence. A bare nonzero / 124
              # timeout / missing exit is NOT.
              wcode=$(cat "${RES}/exit-witnesses.txt" 2>/dev/null || echo missing)
              if [ "$wcode" = "0" ]; then
                echo "OBSERVE: candidate witnesses exit 0 — completed (unexpected on core 0.34; not gated)"
              elif grep -qE 'attempted to take ownership of Rust value while it was borrowed|RuntimeError: unreachable|already (mutably )?borrowed|Borrow(Mut)?Error|panicked at' "${RES}/witnesses.log" 2>/dev/null; then
                echo "OBSERVE: candidate witnesses exit ${wcode} — recognized engine-crash signature in witnesses.log = Outcome-B evidence (NOT gated)"
              elif [ "$wcode" = "124" ] || [ "$wcode" = "137" ]; then
                echo "OBSERVE: candidate witnesses exit ${wcode} — TIMEOUT (RUN_TIMEOUT backstop; a hang, NOT crash evidence; NOT gated)"
              elif [ "$wcode" = "missing" ]; then
                echo "OBSERVE: candidate witnesses exit MISSING — no artifact (missing observation, NOT crash evidence; NOT gated)"
              else
                echo "OBSERVE: candidate witnesses exit ${wcode} — UNEXPLAINED failure, no recognized crash signature (investigate; NOT crash evidence; NOT gated)"
              fi
            fi
          fi
          if [ "${ARM}" = "stable" ]; then
            # Stable must be fully green everywhere.
            for g in timing npmtest browser; do gate "$g"; done
          else
            # Candidate: the reds are EXPECTED — enforce the exact inventory +
            # the must-pass invariants instead of raw green. timing is gated by
            # its own DRIFT allowlist (the single class-(b) profiler re-enable
            # drift the local run recorded): any drift OUTSIDE the allowlist,
            # or an exit/DRIFT-line inconsistency, fails; an allowlisted drift
            # that vanished is reported (flip-watch), not fatal.
            node scripts/compare-spike-runs.js --mode timing \
              --log "${RES}/timing.log" \
              --exit "$(cat "${RES}/exit-timing.txt" 2>/dev/null || echo missing)" \
              --expected .github/spike-expected-candidate-reds.json || fail=1
            node scripts/compare-spike-runs.js --mode classify \
              --test-json "${RES}/npm-test.json" \
              --expected .github/spike-expected-candidate-reds.json --label node || fail=1
            node scripts/compare-spike-runs.js --mode classify \
              --test-json "${RES}/browser.json" \
              --expected .github/spike-expected-candidate-reds.json --label browser || fail=1
            node scripts/compare-spike-runs.js --mode invariants \
              --node-json "${RES}/npm-test.json" \
              --browser-json "${RES}/browser.json" \
              --reproducer-json "${RES}/reproducer.json" \
              --expected .github/spike-expected-candidate-reds.json || fail=1
          fi
          # Write an explicit machine-readable verdict into the arm artifact
          # BEFORE exiting, so the compare job can require adjudication PASSED
          # (a merely-existing results dir must never read as a passing arm).
          passed=$([ "$fail" = "0" ] && echo true || echo false)
          heavy=$([ "${HEAVY}" = "true" ] && echo true || echo false)
          printf '{"schema":"boxcar3d.adjudication/1","arm":"%s","passed":%s,"heavy":%s}\n' \
            "${ARM}" "${passed}" "${heavy}" > "${RES}/adjudication.json"
          cat "${RES}/adjudication.json"
          if [ "$fail" != "0" ]; then echo "ARM ${ARM} FAILED adjudication."; exit 1; fi
          echo "ARM ${ARM} passed adjudication."
      - name: Upload arm results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.arm }}
          path: results-${{ matrix.arm }}
          if-no-files-found: warn

  # Paired perf: two same-commit dirs on ONE runner, alternating stable →
  # candidate → candidate → stable, --json each. Not decision-relevant to Outcome
  # B, but the review asked for a genuine same-runner paired cost observation.
  perf:
    needs: [resolve, build-candidate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          path: perf-stable
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          path: perf-candidate
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Both checkouts live under perf-*/ — there is NO workspace-root
          # package-lock.json, and setup-node throws when `cache: npm` cannot
          # resolve a lockfile. Point it at the stable checkout's lock.
          cache-dependency-path: perf-stable/package-lock.json
      - name: Install stable + candidate side by side
        run: |
          set -euo pipefail
          ( cd perf-stable && npm ci )
          ( cd perf-candidate && npm ci )
      - uses: actions/download-artifact@v4
        with:
          name: candidate-tarballs
          path: dl
      - name: Install candidate tarballs into perf-candidate
        run: |
          set -euo pipefail
          ( cd perf-candidate && npm install ../dl/dimforge-rapier3d-compat-*.tgz ../dl/dimforge-rapier3d-deterministic-compat-*.tgz )
      - name: Alternating paired bench
        run: |
          # errexit OFF (like the matrix capture step): a crashing candidate
          # bench must RECORD its exit and let the remaining alternating runs +
          # the node assembler run — the assembler is the sole pass/fail
          # authority (it exits 1 on an incomplete/errored set). GitHub's default
          # shell keeps -e, and `set -uo pipefail` alone would abort the step at
          # the first failing bench, before its exit is captured.
          set +e -u -o pipefail
          mkdir -p perf
          # bench-physics's `--json` is a string option that REQUIRES a filename
          # (the JSON is written to that path; stdout is always the markdown
          # report, so redirecting stdout can never yield JSON). Pass an
          # absolute path, capture stdout+stderr as the log, and RECORD the
          # bench's own exit code (never swallow it with `|| echo`).
          bench() {
            arm="$1"; i="$2"
            ( cd "perf-${arm}" && npm run bench:physics -- --smoke --json "$GITHUB_WORKSPACE/perf/bench-${arm}-${i}.json" ) \
              > "perf/bench-${arm}-${i}.log" 2>&1
            echo "$?" > "perf/exit-bench-${arm}-${i}.txt"
          }
          bench stable 1
          bench candidate 1
          bench candidate 2
          bench stable 2
          node -e '
            const fs = require("node:fs");
            const load = (f) => { try { return JSON.parse(fs.readFileSync(`perf/${f}`,"utf8")); } catch { return null; } };
            const readExit = (f) => { try { return Number(fs.readFileSync(`perf/${f}`,"utf8").trim()); } catch { return null; } };
            const runs = [["stable",1],["candidate",1],["candidate",2],["stable",2]]
              .map(([arm,i]) => ({ arm, i, exit: readExit(`exit-bench-${arm}-${i}.txt`), json: load(`bench-${arm}-${i}.json`) }));
            const parsed = runs.filter(r => r.json !== null).length;
            const errored = runs.filter(r => r.json && r.json.status === "error").length;
            const allParsed = parsed === runs.length && runs.every(r => r.exit === 0) && errored === 0;
            const summary = {
              order: runs.map(r => `${r.arm}#${r.i}`),
              status: allParsed ? "ok" : "incomplete",
              allParsed, parsed, total: runs.length, errored,
              note: allParsed
                ? "four bench runs parsed; paired ratio computed in C5"
                : `INCOMPLETE — only ${parsed}/${runs.length} bench JSON parsed (exits ${runs.map(r=>r.exit).join(",")})${errored?`, ${errored} errored`:""}`,
            };
            fs.writeFileSync("perf/perf.json", JSON.stringify({ schema: "boxcar3d.spike-perf/1", summary, runs }, null, 2));
            console.log(summary);
            if (!allParsed) { console.error("perf: rejecting incomplete/errored bench set (finding 4)"); process.exit(1); }
          '
      - name: Upload perf
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf
          path: perf

  # The adjudicated comparison: download all arms, emit the side-by-side +
  # manifest to $GITHUB_STEP_SUMMARY and as committable artifacts. Reports any
  # MISSING/failed arm explicitly (never silently skips).
  compare:
    # `resolve` must be a DIRECT dependency: the `needs` context contains only
    # direct deps, so without it `needs.resolve.outputs.sha` silently evaluates
    # to the empty string and the checkout falls back to the default ref.
    needs: [resolve, matrix, perf]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compare + emit comparison.md + result-manifest.json
        run: |
          set -euo pipefail
          mkdir -p spike-out
          node scripts/compare-spike-runs.js --mode compare --artifacts artifacts --out spike-out \
            --expected .github/spike-expected-candidate-reds.json
      - name: Upload comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison
          path: spike-out
