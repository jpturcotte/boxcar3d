name: Rapier 0.34 source smoke

on:
  push:
    branches:
      - experiment/rapier-034-source-smoke
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-build-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      RAPIER_COMMIT: c13133ad293ee70c7f9cec9e498eac016c362169
   