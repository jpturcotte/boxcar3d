name: Rapier 0.34 source smoke

on:
  push:
    branches:
      - experiment/rapier-034-source-smoke
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-build-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      RAPIER_COMMIT: c13133ad293ee70c7f9cec9e498eac016c362169
    steps:
      - name: Checkout BoxCar3D experiment branch
        uses: actions/checkout@v4

      - name: Checkout pinned upstream Rapier source
        uses: actions/checkout@v4
        with:
          repository: dimforge/rapier
          ref: ${{ env.RAPIER_COMMIT }}
          path: upstream-rapier

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify pinned core and binding target
        run: |
          test "$(git -C upstream-rapier rev-parse HEAD)" = "$RAPIER_COMMIT"
          grep '^version = "0.34.0"' upstream-rapier/Cargo.toml
          grep 'rapier{{ dimension }}d = { version = "0.34"' \
            upstream-rapier/typescript/builds/prepare_builds/templates/Cargo.toml.tera

      - name: Build upstream TypeScript compat packages with upstream recipe
        working-directory: upstream-rapier/typescript
        run: |
          npm ci
          ./builds/prepare_builds/prepare_all_projects.sh
          cd rapier-compat
          npm ci
          npm run build
          npm run test

      - name: Verify and import source-built 3D packages
        working-directory: upstream-rapier/typescript/rapier-compat
        run: |
          test -f builds/3d/pkg/rapier.mjs
          test -f builds/3d-deterministic/pkg/rapier.mjs
          node --input-type=module - <<'NODE'
          const normal = await import('./builds/3d/pkg/rapier.mjs');
          const deterministic = await import('./builds/3d-deterministic/pkg/rapier.mjs');
          await normal.init({});
          await deterministic.init({});
          console.log(JSON.stringify({
            normalVersion: normal.version(),
            deterministicVersion: deterministic.version(),
            normalMultibody: typeof normal.MultibodyJointSet,
            deterministicMultibody: typeof deterministic.MultibodyJointSet,
            prismaticMultibodyMotor:
              typeof normal.PrismaticMultibodyJoint?.prototype?.configureMotorPosition,
          }, null, 2));
          NODE

      - name: Install BoxCar3D and substitute source-built packages
        run: |
          npm ci
          rm -rf node_modules/@dimforge/rapier3d-compat \
                 node_modules/@dimforge/rapier3d-deterministic-compat
          ln -s "$GITHUB_WORKSPACE/upstream-rapier/typescript/rapier-compat/builds/3d/pkg" \
                node_modules/@dimforge/rapier3d-compat
          ln -s "$GITHUB_WORKSPACE/upstream-rapier/typescript/rapier-compat/builds/3d-deterministic/pkg" \
                node_modules/@dimforge/rapier3d-deterministic-compat
          node --input-type=module - <<'NODE'
          const normal = await import('@dimforge/rapier3d-compat');
          const deterministic = await import('@dimforge/rapier3d-deterministic-compat');
          await normal.init({});
          await deterministic.init({});
          console.log(`BoxCar3D resolved ordinary ${normal.version()} deterministic ${deterministic.version()}`);
          NODE

      - name: Run BoxCar3D API, build, and deterministic smoke
        run: |
          npm run lint
          npm run build
          npm run test:determinism

      - name: Run PR 17 reproducer and probe smoke
        run: |
          mkdir -p rapier-034-results
          npm run probe:physics-explosion -- --pass reproducer \
            | tee rapier-034-results/reproducer.txt
          npm run probe:physics-explosion -- --smoke \
            | tee rapier-034-results/probe-smoke.txt

      - name: Preserve source-build and probe evidence
        if: always()
        run: |
          mkdir -p rapier-034-results
          {
            echo "upstream_commit=$RAPIER_COMMIT"
            echo "boxcar_commit=$GITHUB_SHA"
            echo "runner=$RUNNER_OS"
          } > rapier-034-results/identity.txt
          find upstream-rapier/typescript/rapier-compat/builds \
            -path '*/pkg/package.json' -print -exec cat {} \; \
            > rapier-034-results/built-package-metadata.txt 2>&1 || true

      - name: Upload experiment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapier-034-source-smoke-results
          path: rapier-034-results
          if-no-files-found: error
